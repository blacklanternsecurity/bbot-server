{{- if .Values.server.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-server
  labels:
    app: bbot-server
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app: bbot-server
  template:
    metadata:
      labels:
        app: bbot-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["bbctl", "server", "start", "--api-only", "--listen", "0.0.0.0"]
        ports:
        - containerPort: 8807
          name: http
          protocol: TCP
        env:
        {{- if .Values.mongodb.enabled }}
        # Internal password references (used for URI interpolation below)
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.auth.existingSecret | default (printf "%s-mongodb" .Release.Name) | quote }}
              key: mongodb-root-password
        {{- end }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redis.auth.existingSecret | default (printf "%s-redis" .Release.Name) | quote }}
              key: redis-password
        # BBOT Server configuration
        - name: BBOT_SERVER_URL
          value: {{ .Values.config.url | default (printf "http://%s-server:%d/v1/" .Release.Name (.Values.server.service.port | int)) | quote }}
        - name: BBOT_SERVER_AUTH_ENABLED
          value: {{ .Values.config.authEnabled | quote }}
        - name: BBOT_SERVER_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.existingApiKeySecret | default (printf "%s-api-key" .Release.Name) | quote }}
              key: api-key
        # MongoDB URIs
        {{- if .Values.mongodb.enabled }}
        - name: BBOT_SERVER_EVENT_STORE__URI
          value: "mongodb://root:$(MONGO_PASSWORD)@{{ .Release.Name }}-mongodb:27017/bbot?authSource=admin"
        {{- else }}
        - name: BBOT_SERVER_EVENT_STORE__URI
          value: {{ .Values.externalMongodb.uri | quote }}
        {{- end }}
        - name: BBOT_SERVER_EVENT_STORE__COLLECTION_PREFIX
          value: "eventstore__"
        {{- if .Values.mongodb.enabled }}
        - name: BBOT_SERVER_ASSET_STORE__URI
          value: "mongodb://root:$(MONGO_PASSWORD)@{{ .Release.Name }}-mongodb:27017/bbot?authSource=admin"
        {{- else }}
        - name: BBOT_SERVER_ASSET_STORE__URI
          value: {{ .Values.externalMongodb.uri | quote }}
        {{- end }}
        - name: BBOT_SERVER_ASSET_STORE__COLLECTION_PREFIX
          value: "assetstore__"
        {{- if .Values.mongodb.enabled }}
        - name: BBOT_SERVER_USER_STORE__URI
          value: "mongodb://root:$(MONGO_PASSWORD)@{{ .Release.Name }}-mongodb:27017/bbot?authSource=admin"
        {{- else }}
        - name: BBOT_SERVER_USER_STORE__URI
          value: {{ .Values.externalMongodb.uri | quote }}
        {{- end }}
        - name: BBOT_SERVER_USER_STORE__COLLECTION_PREFIX
          value: "userstore__"
        # Redis URI
        - name: BBOT_SERVER_MESSAGE_QUEUE__URI
          value: "redis://:$(REDIS_PASSWORD)@{{ .Release.Name }}-redis-master:6379/0"
        {{- with .Values.server.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        readinessProbe:
          httpGet:
            path: /v1/docs
            port: 8807
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /v1/docs
            port: 8807
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-server
  labels:
    app: bbot-server
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
spec:
  type: {{ .Values.server.service.type }}
  selector:
    app: bbot-server
  ports:
  - port: {{ .Values.server.service.port }}
    targetPort: {{ .Values.server.service.targetPort }}
    protocol: TCP
    name: http
{{- end }}
