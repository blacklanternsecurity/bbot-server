x-bbot-server-base: &bbot-server-base
  build:
    context: .
  restart: unless-stopped
  volumes:
    - ~/.config/bbot_server:/root/.config/bbot_server
    - ./bbot_server/defaults_docker.yml:/app/bbot_server/defaults.yml
    - .:/app

services:
  server:
    <<: *bbot-server-base
    ports:
      - "${BBOT_LISTEN_ADDRESS:-127.0.0.1}:${BBOT_PORT:-8807}:8807"
    command: ["bbctl", "server", "start", "--api-only", "--listen", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8807/v1/docs"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - mongodb
      - redis

  watchdog:
    <<: *bbot-server-base
    command: ["bbctl", "server", "start", "--watchdog-only"]
    depends_on:
      server:
        condition: service_healthy

  agent:
    <<: *bbot-server-base
    command: ["bbctl", "agent", "start"]
    entrypoint: ["bash", "/app/bbot_server/default_agent.sh"]
    depends_on:
      server:
        condition: service_healthy

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - ./mongodb:/data/db

  redis:
    image: redis:latest
    restart: unless-stopped
