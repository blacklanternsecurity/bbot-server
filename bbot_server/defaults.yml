# url of BBOT server
url: http://localhost:8807/v1

event_store:
  uri: mongodb://localhost:27017/bbot_events
  table_name: events
  # archive events older than 90 days
  archive_after: 90
  # run archive task once every 24 hours at midnight
  archive_cron: "0 0 * * *"

asset_store:
  uri: mongodb://localhost:27017/bbot_assets
  table_name: assets

message_queue:
  uri: nats://localhost:4222
