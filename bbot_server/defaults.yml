# url of BBOT server
url: http://localhost:8807/v1/

# whether to enable API key authentication
auth_enabled: true
# the header name to use for API key authentication
auth_header: X-API-Key
# the API key to use when in client mode
api_key: null

# event store is just a big bucket of BBOT scan events that act as a read-only time machine
event_store:
  uri: mongodb://localhost:27017/bbot_eventstore

# assets are derived from the event store, and can be recreated at any time
asset_store:
  uri: mongodb://localhost:27017/bbot_assetstore

# user_store holds any user-specific data, overrides, etc. which are not derived from events
# examples include targets, scans, etc.
user_store:
  uri: mongodb://localhost:27017/bbot_userstore

message_queue:
  uri: redis://localhost:6379/0

agent:
  base_preset:
    config:
      omit_event_types:
        # a smaller list of omitted event types
        # since certain BBOT server applets rely on event types like RAW_DNS_RECORD
        - HTTP_RESPONSE
        - DNS_NAME_UNRESOLVED
        - RAW_TEXT
        - WEB_PARAMETER

cli:
  http_timeout: 90
