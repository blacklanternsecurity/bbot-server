# url of BBOT server
url: http://server:8807/v1/

# PostgreSQL database
database:
  uri: postgresql+asyncpg://bbot:bbot@postgres:5432/bbot_server

message_queue:
  uri: redis://redis:6379/0

agent:
  base_preset:
    config:
      omit_event_types:
        # a smaller list of omitted event types
        # since certain BBOT server applets rely on event types like RAW_DNS_RECORD
        - HTTP_RESPONSE
        - DNS_NAME_UNRESOLVED
        - RAW_TEXT
        - WEB_PARAMETER
